<div class="flex min-h-screen items-center justify-center bg-gradient-to-br from-green-700 to-green-900">
  <div class="w-full max-w-4xl rounded-lg shadow-lg p-8 bg-white/80 backdrop-blur-sm">
    <app-nav-button path="/fields" label="Back Fields"></app-nav-button>
    
    <!-- Encabezado -->
    <div class="flex flex-col items-center mb-6">
      <img src="assets/field-icon.png" alt="Field Icon" class="w-16 h-16 mb-2" />
      <h1 class="text-2xl font-bold text-gray-800">
        {{ isEdit ? 'Edit Field' : 'Add Field' }}
      </h1>
    </div>
    
    <!-- Formulario principal en dos columnas -->
    <form #fieldForm="ngForm" (ngSubmit)="saveOrUpdateField()" class="grid grid-cols-2 gap-6">
      
      <!-- Country -->
      <div>
        <label class="block text-gray-700">Country</label>
        <select [(ngModel)]="selectedIdCountry" name="country" required
          (change)="onCountryChange(selectedIdCountry)"
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
          <option *ngFor="let c of countries$ | async" [value]="c.id_country">{{ c.name }}</option>
        </select>
      </div>

      <!-- State -->
      <div>
        <label class="block text-gray-700">State</label>
        <select [(ngModel)]="selectedIdState" name="state" required
          (change)="onStateChange(selectedIdState)"
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
          <option *ngFor="let s of filteredStates$ | async" [value]="s.id_state">{{ s.name }}</option>
        </select>
      </div>

      <!-- Municipality -->
      <div>
        <label class="block text-gray-700">Municipality</label>
        <select [(ngModel)]="field.idMunicipality.idMunicipality" name="municipality" required
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
          <option *ngFor="let m of filteredMunicipalities$ | async" [value]="m.idMunicipality">{{ m.name }}</option>
        </select>
      </div>

      <!-- Name -->
      <div>
        <label class="block text-gray-700">Name</label>
        <input type="text" [(ngModel)]="field.name" name="name" required
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" />
      </div>

      <!-- Address -->
      <div class="col-span-2">
        <label class="block text-gray-700">Address</label>
        <input type="text" [(ngModel)]="field.address" name="address" required
          class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400" />
      </div>

      <!-- Active -->
      <div class="col-span-2 flex items-center space-x-3">
        <input type="checkbox" [(ngModel)]="field.isActive" name="isActive" id="isActive"
          class="h-5 w-5 text-green-600 border-gray-300 rounded focus:ring-2 focus:ring-green-400" />
        <label for="isActive" class="text-gray-700 font-medium">Active</label>
      </div>

      <!-- Submit -->
      <div class="col-span-2">
        <button type="submit" [disabled]="!fieldForm.form.valid"
          class="w-full px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 focus:ring-2 focus:ring-green-400">
          {{ isEdit ? '💾 Save Field' : '➕ Add Field' }}
        </button>
      </div>
    </form>

    <!-- Tabs -->
    <div class="mt-8" *ngIf="isEdit">
      <mat-tab-group>
        <mat-tab label="Schedules">
          <p class="text-gray-600 text-sm">Field schedules configuration. Coming soon...</p>
        </mat-tab>
      </mat-tab-group>
    </div>

    <!-- Messages -->
    <p *ngIf="successMsg" class="mt-4 text-green-600 text-center">{{ successMsg }}</p>
    <p *ngIf="errorMsg" class="mt-4 text-red-600 text-center">{{ errorMsg }}</p>
  </div>
</div>
