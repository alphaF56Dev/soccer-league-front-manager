<div class="w-full rounded-lg shadow-lg p-6 bg-white">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Players</h2>

  <!-- Filtros -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <input
      type="text"
      (input)="setNicknameFilter($event.target.value)"
      placeholder="Nickname"
      class="border rounded-md px-3 py-2 w-full"
    />
    <input
      type="text"
      (input)="setCategoryFilter($event.target.value)"
      placeholder="Category"
      class="border rounded-md px-3 py-2 w-full"
    />
    <input
      type="text"
      (input)="setPlayerNumberFilter($event.target.value)"
      placeholder="Player Number"
      class="border rounded-md px-3 py-2 w-full"
    />
  </div>

  <p *ngIf="successMsg" class="mt-4 text-green-600 text-center">{{ successMsg }}</p>
  <p *ngIf="errorMsg" class="mt-4 text-red-600 text-center">{{ errorMsg }}</p>

  <!-- Listado -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div
      *ngFor="let player of filteredPlayers$ | async"
      class="p-4 border rounded-lg shadow-sm hover:bg-green-50 flex flex-col justify-between"
    >
      <div class="space-y-2">
        <h3 class="text-lg font-semibold text-gray-800">{{ player.nickname }}</h3>
        <p class="text-sm text-gray-600">Categoría: {{ player.categoryName }}</p>
        <p class="text-sm text-gray-600">Rango de edad: {{ player.minAge }} - {{ player.maxAge }}</p>
        <p class="text-sm text-gray-600">Número de playera: {{ player.player_number }}</p>
        <p class="text-sm text-gray-600">
          Fecha de registro: {{ player.registration_date | date:'dd/MM/yyyy' }}
        </p>
        <div class="pt-4">
            <button
            (click)="removePlayer(player.idPlayerCategory)"
            class="px-3 py-2 bg-red-600 text-white text-sm rounded-md hover:bg-red-700 focus:ring-2 focus:ring-red-400"
            >
            Remove
            </button>        
        </div>
      </div>
    </div>
  </div>
</div>
