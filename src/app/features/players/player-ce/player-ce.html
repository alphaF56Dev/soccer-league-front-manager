<div class="w-full rounded-lg shadow-lg p-6 bg-white">
  <!-- Encabezado -->
  <!--<h2 class="text-2xl font-bold text-gray-800 mb-6">Player Role Information</h2>-->
  <p class="text-gray-700 text-base mb-8">
    Please fill out the player role information
  </p>
  <p class="md:col-span-2 pt-4" *ngIf="successMsg" class="mt-4 text-green-600 text-center">{{ successMsg }}</p>
  <p class="md:col-span-2 pt-4" *ngIf="errorMsg" class="mt-4 text-red-600 text-center">{{ errorMsg }}</p>

  <!-- Formulario en dos columnas -->
  <form (ngSubmit)="savePlayer()" class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <!-- Nickname -->
    <div>
      <label class="block text-gray-700">Nickname</label>
      <input
        type="text"
        [(ngModel)]="player.nickname"
        name="nickname"        
        class="w-full px-3 py-2 rounded-md border border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500"
      />
    </div>

    <!-- Posición -->
    <div>
      <label class="block text-gray-700">Position</label>
      <select
        [(ngModel)]="player.position"
        name="position"
        [compareWith]="comparePosition"
        class="w-full px-3 py-2 rounded-md border border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500"
      >
        <option *ngFor="let pos of positions$ | async" [ngValue]="pos">{{ pos.name }}</option>
      </select>
    </div>    

    <!-- Botón Guardar (ocupa toda la fila) -->
    <div class="md:col-span-2 pt-4">
      <button
        type="submit"
        class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 focus:ring-2 focus:ring-green-400"
      >
        Save changes
      </button>
    </div>    
  </form>
</div>
