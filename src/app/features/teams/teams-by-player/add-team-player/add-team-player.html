<div class="fixed inset-0 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-lg p-6">
    <!-- Encabezado -->
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold text-gray-800">Add team to player</h2>
      <button (click)="closeModal()" class="text-gray-500 hover:text-gray-700">&times;</button>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="save()" class="space-y-4">
      <!-- Categoría -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
        <select
          [(ngModel)]="selectedCategoryId"
          name="category"
          (change)="loadTeamsByCategory(selectedCategoryId)"
          class="block w-full h-12 rounded-md border-gray-300 shadow-sm text-base px-3 py-2 focus:border-green-500 focus:ring-green-500"
        >
          <option *ngFor="let cat of $categories | async" [value]="cat.idCategoryLeague">
            {{ cat.name }} ({{ cat.minAge }} - {{ cat.maxAge }} years)
          </option>
        </select>
      </div>

      <!-- Equipo -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Team</label>
        <select
          [(ngModel)]="selectedTeamId"
          name="team"
          class="block w-full h-12 rounded-md border-gray-300 shadow-sm text-base px-3 py-2 focus:border-green-500 focus:ring-green-500"
        >
          <option *ngFor="let team of $teams | async" [value]="team.team.idTeam">
            {{ team.team.name }}
          </option>
        </select>
      </div>

      <!-- Número de playera -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Player Number</label>
        <input
          type="number"
          [(ngModel)]="playerNumber"
          name="playerNumber"
          class="block w-full h-12 rounded-md border-gray-300 shadow-sm text-base px-3 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>

      <!-- Fecha de registro -->
      <!--<div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Fecha de registro</label>
        <input
          type="date"
          [(ngModel)]="registrationDate"
          name="registrationDate"
          class="block w-full h-12 rounded-md border-gray-300 shadow-sm text-base px-3 py-2 focus:border-green-500 focus:ring-green-500"
        />
      </div>-->

      <!-- Botones -->
      <div class="flex justify-end space-x-3 pt-4">
        <button
          type="button"
          (click)="closeModal()"
          class="px-4 py-2 bg-gray-300 text-gray-800 rounded-md hover:bg-gray-400"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 focus:ring-2 focus:ring-green-400"
        >
          Guardar
        </button>
      </div>
    </form>
    <p *ngIf="successMsg" class="mt-4 text-green-600 text-center">{{ successMsg }}</p>
    <p *ngIf="errorMsg" class="mt-4 text-red-600 text-center">{{ errorMsg }}</p>
  </div>
</div>
